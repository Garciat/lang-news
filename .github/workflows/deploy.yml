name: Deploy Lume site to Pages

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    # Refresh every 6 hours at :17 to avoid the busiest top-of-hour queue.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

      - name: Type check
        run: deno check

      - name: Setup Pages
        id: setup-pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v4

      - name: Build site
        env:
          PAGES_BASE_URL: ${{ steps.setup-pages.outputs.base_url }}
        run: |
          if [ -n "$PAGES_BASE_URL" ]; then
            deno task build --location="$PAGES_BASE_URL"
          else
            deno task build
          fi

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
